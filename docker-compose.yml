services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: xalqsugurta-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
            - ./docker/php/zzz-fpm-docker-listen.conf:/usr/local/etc/php-fpm.d/zzz-fpm-docker-listen.conf
            - ./docker/php/healthcheck-fpm.sh:/usr/local/bin/healthcheck-fpm.sh
        networks:
            - impex-network
        depends_on:
            - mysql
            - redis
        environment:
            - APP_ENV=local
            - APP_DEBUG=true
        healthcheck:
            test: ['CMD-SHELL', 'sh /usr/local/bin/healthcheck-fpm.sh']
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 40s

    nginx:
        image: nginx:alpine
        container_name: xalqsugurta-nginx
        restart: unless-stopped
        ports:
            - "7080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - impex-network
        depends_on:
            app:
                condition: service_healthy

    mysql:
        image: mysql:8.0
        container_name: xalqsugurta-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword123
            MYSQL_DATABASE: impex_db
            MYSQL_USER: impex_user
            MYSQL_PASSWORD: impex_pass
        volumes:
            - mysql_data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/my.cnf
        ports:
            - "3309:3306"
        networks:
            - impex-network

    redis:
        image: redis:7-alpine
        container_name: xalqsugurta-redis
        restart: unless-stopped
        ports:
            - "6380:6379"
        volumes:
            - redis_data:/data
        networks:
            - impex-network
        command: redis-server --appendonly yes

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        platform: linux/amd64
        container_name: xalqsugurta-phpmyadmin
        restart: unless-stopped
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            PMA_USER: impex_user
            PMA_PASSWORD: impex_pass
        ports:
            - "7081:80"
        networks:
            - impex-network
        depends_on:
            - mysql

    redis-commander:
        image: rediscommander/redis-commander:latest
        platform: linux/amd64
        container_name: xalqsugurta-redis-commander
        restart: unless-stopped
        environment:
            REDIS_HOSTS: local:redis:6379
        ports:
            - "7082:8081"
        networks:
            - impex-network
        depends_on:
            - redis

volumes:
    mysql_data:
        driver: local
    redis_data:
        driver: local

networks:
    impex-network:
        driver: bridge
