name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

# ─── O'zgaruvchilar ─────────────────────────────────────────────────────────
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_PATH: /var/www/new.xalqsugurta.uz

jobs:
  # ─── 1-bosqich: Docker image yig'ish va GitHub Registry ga yuklash ─────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    # ghcr.io ga push qilish uchun zarur
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout kodni olish
        uses: actions/checkout@v4

      - name: Docker Buildx o'rnatish
        uses: docker/setup-buildx-action@v3

      - name: GitHub Container Registry ga login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN ishlatiladi — REGISTRY_TOKEN shart emas
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tag) tayyorlash
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Image yig'ish va push qilish
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 2-bosqich: Serverga deploy qilish ─────────────────────────────────────
  deploy:
    name: 🖥️ Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH orqali serverga deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          # Server ghcr.io dan pull qilishi uchun REGISTRY_TOKEN ishlatiladi
          DEPLOY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          DEPLOY_PATH: ${{ env.APP_PATH }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 2303
          envs: GH_ACTOR,GH_REPO,DEPLOY_TOKEN,DEPLOY_PATH
          script: |
            set -e

            echo "🔧 Docker Compose v2 tekshirish / o'rnatish..."
            if ! docker compose version &>/dev/null; then
              COMPOSE_VERSION="v2.27.1"
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            echo "✓ $(docker compose version)"

            echo "📁 Loyiha papkasiga o'tish..."
            cd "$DEPLOY_PATH"

            echo "⬇️  Oxirgi kodni GitHub dan tortib olish..."
            git pull origin main

            echo "🔐 GitHub Container Registry ga login..."
            echo "$DEPLOY_TOKEN" | docker login ghcr.io \
              -u "$GH_ACTOR" --password-stdin

            echo "🐳 Yangi Docker image ni tortib olish..."
            docker pull "ghcr.io/$GH_REPO:latest"

            echo "🔄 Konteynerlarni qayta ishga tushirish..."
            APP_IMAGE="ghcr.io/$GH_REPO:latest" \
              docker compose -f docker-compose.prod.yml up -d \
              --no-deps --no-build app nginx

            echo "⏳ App konteyneri tayyor bo'lishini kutish..."
            sleep 5

            echo "📦 Laravel migrations va cache..."
            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan migrate --force

            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan config:cache

            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan route:cache

            docker compose -f docker-compose.prod.yml exec -T app \
              php artisan view:cache

            echo "🧹 Eski Docker image larni tozalash..."
            docker image prune -f

            echo "✅ Deploy muvaffaqiyatli yakunlandi!"
